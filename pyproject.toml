[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = []

[tool.ruff.lint.isort]
known-first-party = [
    "analytics",
    "alternative_data",
    "data",
    "evaluation",
    "explainability",
    "features",
    "models",
    "optimization",
    "regime",
    "risk",
    "rl",
    "simulations",
    "trading",
    "utils",
    "visualization",
]
